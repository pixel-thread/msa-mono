name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mfsa_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - run: pnpm prisma generate

      - run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mfsa_test

      - run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mfsa_test
          NODE_ENV: test
          JWT_SECRET: your-super-secret-jwt-key-min-32-chars
          JWT_REFRESH_SECRET: your-super-secret-refresh-key-min-32-chars
          JWT_PASSWORD_RESET_SECRET: your-super-secret-refresh-key-min-32-chars
          JWT_ISSUER: http://localhost:4000
          JWT_AUDIENCE: http://localhost:4000
          ACCESS_TOKEN_EXPIRY: 15m
          REFRESH_TOKEN_EXPIRY: 7d
          RESEND_API_KEY: re_test
          UPSTASH_REDIS_REST_URL: https://test.upstash.io
          UPSTASH_REDIS_REST_TOKEN: test
